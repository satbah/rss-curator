<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" width="820" height="620" font-family="'Segoe UI', Helvetica, Arial, sans-serif">

  <rect width="820" height="620" fill="#f8f9fa" rx="8"/>

  <!-- タイトル -->
  <text x="410" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">RSSポーリング＆ローカルAIフィルタリング — 通信シーケンス</text>

  <!-- ===== ライフライン ヘッダー ===== -->
  <!-- APScheduler -->
  <rect x="20" y="50" width="130" height="44" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5" rx="5"/>
  <text x="85" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">APScheduler</text>
  <text x="85" y="84" text-anchor="middle" font-size="10" fill="#2e7d32">scheduler.py</text>

  <!-- feedparser -->
  <rect x="180" y="50" width="130" height="44" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5" rx="5"/>
  <text x="245" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">feedparser</text>
  <text x="245" y="84" text-anchor="middle" font-size="10" fill="#2e7d32">run_in_executor</text>

  <!-- RSSサーバー -->
  <rect x="340" y="50" width="130" height="44" fill="#ffe0b2" stroke="#fb8c00" stroke-width="1.5" rx="5"/>
  <text x="405" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">RSS サーバー</text>
  <text x="405" y="84" text-anchor="middle" font-size="10" fill="#bf360c">Internet</text>

  <!-- Ollama -->
  <rect x="500" y="50" width="140" height="44" fill="#e1bee7" stroke="#7b1fa2" stroke-width="1.5" rx="5"/>
  <text x="570" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a148c">Ollama</text>
  <text x="570" y="84" text-anchor="middle" font-size="10" fill="#6a1b9a">localhost:11434</text>

  <!-- SQLite -->
  <rect x="670" y="50" width="130" height="44" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" rx="5"/>
  <text x="735" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#b71c1c">SQLite</text>
  <text x="735" y="84" text-anchor="middle" font-size="10" fill="#c62828">news.db</text>

  <!-- ===== ライフライン（縦線）===== -->
  <line x1="85"  y1="94" x2="85"  y2="600" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="245" y1="94" x2="245" y2="600" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="405" y1="94" x2="405" y2="600" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="570" y1="94" x2="570" y2="600" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="735" y1="94" x2="735" y2="600" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== ステップ ===== -->

  <!-- STEP 1: インターバル経過 or 起動時 -->
  <rect x="5" y="110" width="200" height="22" fill="#e8f5e9" stroke="#a5d6a7" rx="3"/>
  <text x="105" y="125" text-anchor="middle" font-size="10" fill="#2e7d32">① インターバル経過 / サーバー起動時</text>

  <!-- スケジューラ → feedparser: fetch開始 -->
  <line x1="85" y1="148" x2="235" y2="148" stroke="#388e3c" stroke-width="1.8" marker-end="url(#s-arrow-green)"/>
  <text x="160" y="142" text-anchor="middle" font-size="10" fill="#2e7d32">fetch_feed(url, etag, modified)</text>

  <!-- feedparser → RSS: GET -->
  <line x1="245" y1="178" x2="395" y2="178" stroke="#fb8c00" stroke-width="1.8" marker-end="url(#s-arrow-orange)"/>
  <text x="320" y="172" text-anchor="middle" font-size="10" fill="#e65100">HTTP GET (etag / If-Modified-Since)</text>

  <!-- RSS → feedparser: 304 or entries -->
  <line x1="395" y1="208" x2="253" y2="208" stroke="#fb8c00" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#s-arrow-orange-l)"/>
  <text x="320" y="202" text-anchor="middle" font-size="10" fill="#bf360c">304 Not Modified  OR  エントリ一覧</text>

  <!-- 304の場合 分岐 -->
  <rect x="180" y="220" width="240" height="22" fill="#fff9c4" stroke="#f9a825" rx="3"/>
  <text x="300" y="235" text-anchor="middle" font-size="10" fill="#f57f17">304 の場合 → 処理終了（帯域節約）</text>

  <!-- GUID重複チェック -->
  <line x1="245" y1="260" x2="720" y2="260" stroke="#c62828" stroke-width="1.8" marker-end="url(#s-arrow-red)"/>
  <text x="482" y="254" text-anchor="middle" font-size="10" fill="#c62828">② seen_guids に新規エントリのGUID照合</text>
  <line x1="720" y1="280" x2="253" y2="280" stroke="#c62828" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#s-arrow-red-l)"/>
  <text x="482" y="295" text-anchor="middle" font-size="10" fill="#c62828">既存GUIDは除外 → 新規エントリのみ返却</text>

  <!-- スケジューラ → Ollama: バッチ送信 -->
  <line x1="85" y1="320" x2="555" y2="320" stroke="#7b1fa2" stroke-width="1.8" marker-end="url(#s-arrow-purple)"/>
  <text x="320" y="314" text-anchor="middle" font-size="10" fill="#6a1b9a">③ タイトル + summary を送信（並列数 OLLAMA_CONCURRENCY）</text>

  <!-- Ollama concurrency note -->
  <rect x="420" y="330" width="250" height="22" fill="#f3e5f5" stroke="#7b1fa2" rx="3"/>
  <text x="545" y="345" text-anchor="middle" font-size="10" fill="#6a1b9a">temperature=0, format=json で安定した JSON 出力</text>

  <!-- Ollama → Scheduler: 判定結果 -->
  <line x1="555" y1="368" x2="93" y2="368" stroke="#7b1fa2" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#s-arrow-purple-l)"/>
  <text x="320" y="362" text-anchor="middle" font-size="10" fill="#6a1b9a">④ {"match": true/false, "reason": "..."}</text>

  <!-- match=false は破棄 -->
  <rect x="5" y="380" width="240" height="22" fill="#fff9c4" stroke="#f9a825" rx="3"/>
  <text x="125" y="395" text-anchor="middle" font-size="10" fill="#f57f17">match=false → 破棄（DBに書かない）</text>

  <!-- match=true → articles INSERT -->
  <line x1="85" y1="420" x2="720" y2="420" stroke="#c62828" stroke-width="1.8" marker-end="url(#s-arrow-red)"/>
  <text x="400" y="414" text-anchor="middle" font-size="10" fill="#c62828">⑤ match=true の記事を articles に INSERT (ON CONFLICT IGNORE)</text>

  <!-- seen_guids UPDATE -->
  <line x1="85" y1="452" x2="720" y2="452" stroke="#c62828" stroke-width="1.8" marker-end="url(#s-arrow-red)"/>
  <text x="400" y="446" text-anchor="middle" font-size="10" fill="#c62828">⑥ 今回の全GUIDを seen_guids に追加（ON CONFLICT IGNORE）</text>

  <!-- feeds.last_fetched_at UPDATE -->
  <line x1="85" y1="484" x2="720" y2="484" stroke="#c62828" stroke-width="1.8" marker-end="url(#s-arrow-red)"/>
  <text x="400" y="478" text-anchor="middle" font-size="10" fill="#c62828">⑦ feeds.last_fetched_at / etag を更新</text>

  <!-- 完了 -->
  <rect x="5" y="510" width="200" height="22" fill="#e8f5e9" stroke="#a5d6a7" rx="3"/>
  <text x="105" y="525" text-anchor="middle" font-size="10" fill="#2e7d32">次のインターバルまで待機</text>

  <!-- 凡例 -->
  <rect x="20" y="548" width="780" height="48" fill="#ffffff" stroke="#bdbdbd" stroke-width="1" rx="4"/>
  <text x="40" y="566" font-size="10" fill="#333" font-weight="bold">凡例:</text>
  <line x1="75" y1="563" x2="110" y2="563" stroke="#388e3c" stroke-width="1.8" marker-end="url(#s-arrow-green)"/>
  <text x="116" y="567" font-size="10" fill="#333">内部呼び出し</text>
  <line x1="210" y1="563" x2="245" y2="563" stroke="#fb8c00" stroke-width="1.8" marker-end="url(#s-arrow-orange)"/>
  <text x="251" y="567" font-size="10" fill="#333">外部 HTTP</text>
  <line x1="340" y1="563" x2="375" y2="563" stroke="#7b1fa2" stroke-width="1.8" marker-end="url(#s-arrow-purple)"/>
  <text x="381" y="567" font-size="10" fill="#333">Ollama (localhost)</text>
  <line x1="495" y1="563" x2="530" y2="563" stroke="#c62828" stroke-width="1.8" marker-end="url(#s-arrow-red)"/>
  <text x="536" y="567" font-size="10" fill="#333">DB 書き込み</text>
  <line x1="630" y1="563" x2="665" y2="563" stroke="#9e9e9e" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#s-arrow-gray)"/>
  <text x="671" y="567" font-size="10" fill="#333">レスポンス（破線）</text>
  <rect x="75" y="577" width="26" height="12" fill="#fff9c4" stroke="#f9a825" rx="2"/>
  <text x="107" y="588" font-size="10" fill="#333">分岐 / 条件</text>

  <!-- マーカー定義 -->
  <defs>
    <marker id="s-arrow-green" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#388e3c"/>
    </marker>
    <marker id="s-arrow-orange" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#fb8c00"/>
    </marker>
    <marker id="s-arrow-orange-l" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#fb8c00"/>
    </marker>
    <marker id="s-arrow-purple" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7b1fa2"/>
    </marker>
    <marker id="s-arrow-purple-l" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7b1fa2"/>
    </marker>
    <marker id="s-arrow-red" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#c62828"/>
    </marker>
    <marker id="s-arrow-red-l" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#c62828"/>
    </marker>
    <marker id="s-arrow-gray" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#9e9e9e"/>
    </marker>
  </defs>
</svg>
