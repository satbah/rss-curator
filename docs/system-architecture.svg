<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" width="820" height="580" font-family="'Segoe UI', Helvetica, Arial, sans-serif">

  <!-- 背景 -->
  <rect width="820" height="580" fill="#f8f9fa" rx="8"/>

  <!-- ========== 外部サービスゾーン (RSS のみ) ========== -->
  <rect x="20" y="20" width="180" height="100" fill="#fff3e0" stroke="#fb8c00" stroke-width="1.5" rx="8" stroke-dasharray="6,3"/>
  <text x="110" y="42" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">外部サービス (Internet)</text>
  <rect x="36" y="54" width="148" height="56" fill="#ffe0b2" stroke="#fb8c00" stroke-width="1.5" rx="6"/>
  <text x="110" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#e65100">RSS / Atom フィード</text>
  <text x="110" y="94" text-anchor="middle" font-size="10" fill="#bf360c">Internet (各メディア)</text>

  <!-- ========== ローカルサービスゾーン (Ollama) ========== -->
  <rect x="20" y="140" width="180" height="130" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5" rx="8" stroke-dasharray="6,3"/>
  <text x="110" y="162" text-anchor="middle" font-size="11" fill="#6a1b9a" font-weight="bold">ローカルサービス</text>
  <rect x="36" y="174" width="148" height="84" fill="#e1bee7" stroke="#7b1fa2" stroke-width="1.5" rx="6"/>
  <text x="110" y="197" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a148c">Ollama</text>
  <text x="110" y="215" text-anchor="middle" font-size="10" fill="#6a1b9a">qwen2.5:7b (Q4_K_M)</text>
  <text x="110" y="231" text-anchor="middle" font-size="10" fill="#6a1b9a">localhost:11434</text>
  <text x="110" y="247" text-anchor="middle" font-size="10" fill="#6a1b9a">CPU 推論（RAM 常駐）</text>

  <!-- ========== アプリケーション層 ========== -->
  <rect x="230" y="20" width="440" height="420" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5" rx="8" stroke-dasharray="6,3"/>
  <text x="450" y="42" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="bold">アプリケーション (Python / FastAPI)</text>

  <!-- FastAPI -->
  <rect x="250" y="56" width="180" height="100" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="6"/>
  <text x="340" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">FastAPI</text>
  <text x="340" y="97" text-anchor="middle" font-size="10" fill="#2e7d32">+ Jinja2 テンプレート</text>
  <text x="340" y="113" text-anchor="middle" font-size="10" fill="#2e7d32">+ HTMX (部分更新)</text>
  <text x="340" y="129" text-anchor="middle" font-size="10" fill="#2e7d32">/feeds  /interests  /articles</text>

  <!-- APScheduler -->
  <rect x="460" y="56" width="188" height="100" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="6"/>
  <text x="554" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">APScheduler</text>
  <text x="554" y="97" text-anchor="middle" font-size="10" fill="#2e7d32">AsyncIOScheduler</text>
  <text x="554" y="113" text-anchor="middle" font-size="10" fill="#2e7d32">起動時即時 + 間隔ポーリング</text>
  <text x="554" y="129" text-anchor="middle" font-size="10" fill="#2e7d32">ジョブ状態を SQLite に永続化</text>

  <!-- feedparser -->
  <rect x="250" y="196" width="180" height="80" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="6"/>
  <text x="340" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">feedparser</text>
  <text x="340" y="240" text-anchor="middle" font-size="10" fill="#2e7d32">RSS/Atom パース</text>
  <text x="340" y="256" text-anchor="middle" font-size="10" fill="#2e7d32">etag / 304 差分取得</text>

  <!-- ai_filter -->
  <rect x="460" y="196" width="188" height="80" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="6"/>
  <text x="554" y="220" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">ai_filter.py</text>
  <text x="554" y="240" text-anchor="middle" font-size="10" fill="#2e7d32">Ollama HTTP 呼び出し</text>
  <text x="554" y="256" text-anchor="middle" font-size="10" fill="#2e7d32">並列数 OLLAMA_CONCURRENCY</text>

  <!-- Peewee ORM -->
  <rect x="290" y="330" width="320" height="88" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="6"/>
  <text x="450" y="354" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Peewee ORM</text>
  <text x="450" y="374" text-anchor="middle" font-size="10" fill="#2e7d32">feeds / interests / articles / seen_guids</text>
  <text x="450" y="390" text-anchor="middle" font-size="10" fill="#2e7d32">article(feed_id, guid) UNIQUE 制約</text>
  <text x="450" y="406" text-anchor="middle" font-size="10" fill="#2e7d32">seen_guids 複合 PK で重複排除</text>

  <!-- ========== ブラウザ ========== -->
  <rect x="690" y="56" width="110" height="100" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
  <text x="745" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">ブラウザ</text>
  <text x="745" y="103" text-anchor="middle" font-size="10" fill="#1565c0">設定 UI</text>
  <text x="745" y="119" text-anchor="middle" font-size="10" fill="#1565c0">記事閲覧</text>
  <text x="745" y="138" text-anchor="middle" font-size="10" fill="#1565c0">HTMX</text>

  <!-- ========== SQLite ========== -->
  <rect x="560" y="460" width="220" height="100" fill="#fce4ec" stroke="#c62828" stroke-width="2" rx="6"/>
  <text x="670" y="484" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">SQLite</text>
  <text x="670" y="504" text-anchor="middle" font-size="10" fill="#c62828">news.db</text>
  <text x="670" y="520" text-anchor="middle" font-size="10" fill="#c62828">feeds / interests / articles</text>
  <text x="670" y="536" text-anchor="middle" font-size="10" fill="#c62828">seen_guids / scheduler jobs</text>

  <!-- ========== 矢印 ========== -->
  <!-- ブラウザ ↔ FastAPI -->
  <line x1="690" y1="106" x2="432" y2="106" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow-blue)" marker-start="url(#arrow-blue-r)"/>
  <text x="560" y="99" text-anchor="middle" font-size="10" fill="#1565c0">HTTP / HTMX</text>

  <!-- APScheduler → feedparser -->
  <line x1="554" y1="156" x2="430" y2="196" stroke="#388e3c" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="504" y="184" text-anchor="middle" font-size="10" fill="#2e7d32">起動</text>

  <!-- feedparser ↔ RSS Feeds -->
  <line x1="250" y1="220" x2="184" y2="100" stroke="#fb8c00" stroke-width="1.8" marker-end="url(#arrow-orange)" marker-start="url(#arrow-orange-r)"/>
  <text x="204" y="160" text-anchor="middle" font-size="10" fill="#e65100">HTTP GET</text>

  <!-- feedparser → ai_filter -->
  <line x1="430" y1="236" x2="460" y2="236" stroke="#388e3c" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="445" y="228" text-anchor="middle" font-size="10" fill="#2e7d32">新規エントリ</text>

  <!-- ai_filter → Ollama (localhost) -->
  <line x1="460" y1="248" x2="184" y2="220" stroke="#7b1fa2" stroke-width="1.8" marker-end="url(#arrow-purple)" stroke-dasharray="5,3"/>
  <text x="310" y="254" text-anchor="middle" font-size="10" fill="#6a1b9a">HTTP localhost</text>

  <!-- ai_filter → Peewee -->
  <line x1="554" y1="276" x2="510" y2="330" stroke="#388e3c" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="556" y="310" text-anchor="middle" font-size="10" fill="#2e7d32">match=true</text>

  <!-- FastAPI → Peewee -->
  <line x1="340" y1="156" x2="390" y2="330" stroke="#388e3c" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- Peewee → SQLite -->
  <line x1="450" y1="418" x2="620" y2="460" stroke="#c62828" stroke-width="1.8" marker-end="url(#arrow-red)"/>
  <text x="510" y="448" text-anchor="middle" font-size="10" fill="#b71c1c">SQL</text>

  <!-- マーカー定義 -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-blue-r" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L8,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fb8c00"/>
    </marker>
    <marker id="arrow-orange-r" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L8,3 z" fill="#fb8c00"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7b1fa2"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c62828"/>
    </marker>
  </defs>
</svg>
